version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: sigaedu_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sigaedu
    ports:
      - "5432:5432"
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sigaedu"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sigaedu_net:
    driver: bridge